services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - line-bot-server
      - fullybnb-site
    ports:
      - "80:80"
      - "443:443"
    environment:
      BOT_DOMAIN: ${BOT_DOMAIN}
      SITE_DOMAIN: ${SITE_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  line-bot-server:
    build:
      context: .
      dockerfile: line-bot-server/Dockerfile
    restart: unless-stopped
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      FLASK_ENV: production
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Taipei}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-5}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE:-}
      DB_SSLROOTCERT: ${DB_SSLROOTCERT:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET}
      LINE_BROADCAST_GROUP_ID: ${LINE_BROADCAST_GROUP_ID}
      LINE_ADMIN_USER_IDS: ${LINE_ADMIN_USER_IDS:-}
      PROPERTY_NAME: ${PROPERTY_NAME}
      BANK_ACCOUNT_INFO: ${BANK_ACCOUNT_INFO}
      PUBLIC_BOOKING_DISCOUNT_PER_ROOM_NIGHT: ${PUBLIC_BOOKING_DISCOUNT_PER_ROOM_NIGHT:-0}
    volumes:
      - ./certs:/app/certs:ro
      - /etc/localtime:/etc/localtime:ro

  scheduler:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    restart: unless-stopped
    environment:
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Taipei}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-5}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE:-}
      DB_SSLROOTCERT: ${DB_SSLROOTCERT:-}
      GOOGLE_SERVICE_ACCOUNT_CRED_FILE: ${GOOGLE_SERVICE_ACCOUNT_CRED_FILE}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID}
      GOOGLE_CALENDAR_SYNC_MIN_TIME: ${GOOGLE_CALENDAR_SYNC_MIN_TIME}
      NOTION_TOKEN: ${NOTION_TOKEN}
      NOTION_DATABASE_ID: ${NOTION_DATABASE_ID}
      NOTION_SYNC_MIN_TIME: ${NOTION_SYNC_MIN_TIME}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN}
      LINE_BROADCAST_GROUP_ID: ${LINE_BROADCAST_GROUP_ID}
    volumes:
      - ./certs:/app/certs:ro
      - ./secrets:/app/secrets:ro
      - ./backup:/app/backup
      - /etc/localtime:/etc/localtime:ro

  fullybnb-site:
    build:
      context: ./fullybnb-site
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  caddy_data:
  caddy_config:
