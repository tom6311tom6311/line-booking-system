services:
  local-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fullybnb
      POSTGRES_PASSWORD: fullybnb
      POSTGRES_DB: room_booking_db
    ports:
      - "5433:5432"
    volumes:
      - local_db_data:/var/lib/postgresql/data
      - ./db/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fullybnb -d room_booking_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  line-bot-server:
    depends_on:
      local-db:
        condition: service_healthy
    ports:
      - "5001:5000"
    environment:
      DB_HOST: local-db
      DB_PORT: "5432"
      DB_CONNECT_TIMEOUT: "5"
      DB_USER: fullybnb
      DB_PASSWORD: fullybnb
      DB_NAME: room_booking_db
      DB_SSLMODE: ""
      DB_SSLROOTCERT: ""

volumes:
  local_db_data:
